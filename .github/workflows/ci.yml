name: CI — Lint, Test, Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  # ─── Lint ────────────────────────────────────────────────────────────────
  lint-backend:
    name: Lint Backend (ruff + mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "${{ env.PYTHON_VERSION }}" }
      - run: pip install ruff mypy
      - run: ruff check backend/
      - run: ruff format --check backend/

  lint-frontend:
    name: Lint Frontend (ESLint + TypeScript)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "${{ env.NODE_VERSION }}", cache: npm, cache-dependency-path: frontend/package-lock.json }
      - run: npm ci
        working-directory: frontend
      - run: npm run lint
        working-directory: frontend
      - run: npx tsc --noEmit
        working-directory: frontend

  # ─── Test ────────────────────────────────────────────────────────────────
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: rag_user
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: rag_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://rag_user:testpassword@localhost:5432/rag_test
      REDIS_URL: redis://localhost:6379/0
      SECRET_KEY: test-secret-key-for-ci
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "${{ env.PYTHON_VERSION }}" }
      - name: Install shared dependencies
        run: pip install -r backend/shared/requirements.txt
      - name: Install test dependencies
        run: pip install pytest pytest-asyncio httpx factory-boy pytest-cov
      - name: Run unit tests
        run: pytest tests/unit/ -v --tb=short --cov=backend --cov-report=xml
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with: { file: coverage.xml }

  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "${{ env.NODE_VERSION }}", cache: npm, cache-dependency-path: frontend/package-lock.json }
      - run: npm ci
        working-directory: frontend
      - run: npm test -- --passWithNoTests
        working-directory: frontend

  # ─── Security ────────────────────────────────────────────────────────────
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "${{ env.PYTHON_VERSION }}" }
      - run: pip install bandit safety
      - name: Bandit SAST
        run: bandit -r backend/ -ll --skip B101,B311 -f json -o bandit-report.json || true
      - name: Safety dependency check
        run: safety check -r backend/shared/requirements.txt || true
      - uses: actions/setup-node@v4
        with: { node-version: "${{ env.NODE_VERSION }}" }
      - run: npm audit --audit-level=high || true
        working-directory: frontend

  # ─── Docker Build ────────────────────────────────────────────────────────
  docker-build:
    name: Docker Build (no push on PR)
    runs-on: ubuntu-latest
    needs: [lint-backend, lint-frontend, test-backend]
    strategy:
      matrix:
        service:
          - { name: api_gateway, context: backend/api_gateway }
          - { name: chat_service, context: backend/chat_service }
          - { name: document_service, context: backend/document_service }
          - { name: auth_service, context: backend/auth_service }
          - { name: frontend, context: frontend }
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build ${{ matrix.service.name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.service.context }}
          push: false
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service.name }}:pr-${{ github.event.number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
