<svg width="800" height="120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Animated gradient shimmer -->
    <linearGradient id="shimmer" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1">
        <animate attributeName="stop-color"
          values="#6366f1;#818cf8;#a5b4fc;#818cf8;#6366f1"
          dur="3s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#a5b4fc">
        <animate attributeName="stop-color"
          values="#a5b4fc;#c4b5fd;#e0e7ff;#c4b5fd;#a5b4fc"
          dur="3s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#8b5cf6">
        <animate attributeName="stop-color"
          values="#8b5cf6;#a78bfa;#c4b5fd;#a78bfa;#8b5cf6"
          dur="3s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <!-- Glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Background gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>

    <!-- Particle gradient -->
    <radialGradient id="dot" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="120" rx="16" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <g opacity="0.06" stroke="#818cf8" stroke-width="0.5">
    <line x1="0" y1="30" x2="800" y2="30"/>
    <line x1="0" y1="60" x2="800" y2="60"/>
    <line x1="0" y1="90" x2="800" y2="90"/>
    <line x1="200" y1="0" x2="200" y2="120"/>
    <line x1="400" y1="0" x2="400" y2="120"/>
    <line x1="600" y1="0" x2="600" y2="120"/>
  </g>

  <!-- Floating particles -->
  <circle cx="60" cy="25" r="3" fill="url(#dot)">
    <animate attributeName="cy" values="25;18;25" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;1;0.6" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="740" cy="95" r="4" fill="url(#dot)">
    <animate attributeName="cy" values="95;102;95" dur="3.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0.9;0.5" dur="3.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="150" cy="90" r="2.5" fill="url(#dot)">
    <animate attributeName="cy" values="90;83;90" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;0.8;0.4" dur="5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="650" cy="20" r="3.5" fill="url(#dot)">
    <animate attributeName="cy" values="20;28;20" dur="4.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;1;0.5" dur="4.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="400" cy="10" r="2" fill="url(#dot)">
    <animate attributeName="cy" values="10;16;10" dur="3.8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0.7;0.3" dur="3.8s" repeatCount="indefinite"/>
  </circle>

  <!-- Brain icon (animated) -->
  <g transform="translate(48, 60)" filter="url(#glow)">
    <circle r="22" fill="#6366f1" fill-opacity="0.15">
      <animate attributeName="r" values="22;25;22" dur="2.5s" repeatCount="indefinite"/>
      <animate attributeName="fill-opacity" values="0.15;0.25;0.15" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <text x="0" y="8" text-anchor="middle" font-size="24" fill="url(#shimmer)">🧠</text>
  </g>

  <!-- Main title — animated entrance + shimmer -->
  <text
    x="400" y="55"
    text-anchor="middle"
    font-family="'Segoe UI', 'Inter', Arial, sans-serif"
    font-size="32"
    font-weight="800"
    letter-spacing="1"
    fill="url(#shimmer)"
    filter="url(#glow)"
  >
    Enterprise RAG Knowledge Assistant
    <animate attributeName="opacity" values="0;0;1" dur="0.8s" fill="freeze"/>
  </text>

  <!-- Animated underline -->
  <rect x="180" y="65" height="2" rx="1" fill="url(#shimmer)">
    <animate attributeName="width" values="0;440" dur="1.2s" fill="freeze" calcMode="spline"
      keySplines="0.4 0 0.2 1"/>
    <animate attributeName="x" values="400;180" dur="1.2s" fill="freeze" calcMode="spline"
      keySplines="0.4 0 0.2 1"/>
  </rect>

  <!-- Subtitle -->
  <text
    x="400" y="92"
    text-anchor="middle"
    font-family="'Segoe UI', 'Inter', Arial, sans-serif"
    font-size="13"
    font-weight="400"
    letter-spacing="3"
    fill="#94a3b8"
  >
    UPLOAD · SEARCH · ANSWER · CITE
    <animate attributeName="opacity" values="0;0;0;1" dur="1.5s" fill="freeze"/>
  </text>

  <!-- Border glow -->
  <rect width="798" height="118" x="1" y="1" rx="15" fill="none" stroke="url(#shimmer)" stroke-width="1" opacity="0.3">
    <animate attributeName="opacity" values="0.2;0.5;0.2" dur="3s" repeatCount="indefinite"/>
  </rect>
</svg>
